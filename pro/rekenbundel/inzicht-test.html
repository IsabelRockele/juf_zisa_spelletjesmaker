<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Inzicht layout test</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
h2 { color: #1A3A5C; }

/* ── Inzicht oefening layout ── */
.inzicht-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 8px 0;
  max-width: 700px;
}

.inzicht-oef {
  position: relative;
  border: 1.5px solid #ccc;
  border-radius: 12px;
  padding: 14px 12px 12px;
  background: #fff;
}

/* 2-koloms binnenin: links afbeeldingen, rechts formules */
.inzicht-inner {
  display: flex;
  flex-direction: row;
  gap: 20px;
  align-items: flex-start;
}

.inzicht-links {
  flex-shrink: 0;
  border-right: 1px solid #eee;
  padding-right: 16px;
}

.inzicht-rechts {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.inzicht-groepjes-wrap {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.inzicht-groepjes-rij {
  display: flex;
  flex-direction: row;
  gap: 7px;
}

.inzicht-vakje {
  border: 2.5px solid #E64A19;
  border-radius: 10px;
  padding: 7px;
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  background: #FFF3E0;
  min-width: 54px;
  min-height: 54px;
  align-items: center;
  justify-content: center;
}

.inzicht-emoji { font-size: 22px; line-height: 1.1; }

.inzicht-som-rij {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: nowrap;
}

.inzicht-hokje {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 34px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #fff;
  flex-shrink: 0;
}
.inzicht-hokje.smal { width: 28px; height: 34px; }

.inzicht-plus, .inzicht-op {
  font-size: 20px; font-weight: 700; color: #E64A19;
  flex-shrink: 0; display: flex; align-items: center;
}
.inzicht-is {
  font-size: 20px; font-weight: 700; color: #555;
  flex-shrink: 0; display: flex; align-items: center; margin: 0 2px;
}

.inzicht-groepen-van-rij {
  display: flex; align-items: center; gap: 8px;
}
.inzicht-groepen-label {
  font-size: 16px; font-style: italic; color: #444; font-weight: 600;
}
.inzicht-keer-label {
  font-size: 16px; font-style: italic; color: #444; font-weight: 600;
}
</style>
</head>
<body>
<h2>Schrijf de herhaalde optelling en de vermenigvuldiging.</h2>
<div class="inzicht-grid">

  <!-- Oefening 1: 3 groepen van 2 -->
  <div class="inzicht-oef">
    <div class="inzicht-inner">
      <div class="inzicht-links">
        <div class="inzicht-groepjes-wrap">
          <div class="inzicht-groepjes-rij">
            <div class="inzicht-vakje"><span class="inzicht-emoji">🚗</span><span class="inzicht-emoji">🚗</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🚗</span><span class="inzicht-emoji">🚗</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🚗</span><span class="inzicht-emoji">🚗</span></div>
          </div>
        </div>
      </div>
      <div class="inzicht-rechts">
        <div class="inzicht-groepen-van-rij">
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-groepen-label">groepen van</span>
          <span class="inzicht-hokje smal"></span>
        </div>
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span>
          <span class="inzicht-is">=</span>
          <span class="inzicht-hokje"></span>
        </div>
        <div class="inzicht-keer-label">keer</div>
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-op">×</span>
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-is">=</span>
          <span class="inzicht-hokje smal"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Oefening 2: 4 groepen van 3 -->
  <div class="inzicht-oef">
    <div class="inzicht-inner">
      <div class="inzicht-links">
        <div class="inzicht-groepjes-wrap">
          <div class="inzicht-groepjes-rij">
            <div class="inzicht-vakje"><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span><span class="inzicht-emoji">⭐</span></div>
          </div>
        </div>
      </div>
      <div class="inzicht-rechts">
        <div class="inzicht-groepen-van-rij">
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-groepen-label">groepen van</span>
          <span class="inzicht-hokje smal"></span>
        </div>
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span>
          <span class="inzicht-is">=</span>
          <span class="inzicht-hokje"></span>
        </div>
        <div class="inzicht-keer-label">keer</div>
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-op">×</span>
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-is">=</span>
          <span class="inzicht-hokje smal"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Oefening 3: 7 groepen van 2 (splits over 2 rijen) -->
  <div class="inzicht-oef">
    <div class="inzicht-inner">
      <div class="inzicht-links">
        <div class="inzicht-groepjes-wrap">
          <div class="inzicht-groepjes-rij">
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
          </div>
          <div class="inzicht-groepjes-rij">
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
            <div class="inzicht-vakje"><span class="inzicht-emoji">🌸</span><span class="inzicht-emoji">🌸</span></div>
          </div>
        </div>
      </div>
      <div class="inzicht-rechts">
        <div class="inzicht-groepen-van-rij">
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-groepen-label">groepen van</span>
          <span class="inzicht-hokje smal"></span>
        </div>
        <!-- gesplitst: 5 + 2 -->
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
        </div>
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje"></span><span class="inzicht-plus">+</span>
          <span class="inzicht-hokje"></span>
          <span class="inzicht-is">=</span>
          <span class="inzicht-hokje"></span>
        </div>
        <div class="inzicht-keer-label">keer</div>
        <div class="inzicht-som-rij">
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-op">×</span>
          <span class="inzicht-hokje smal"></span>
          <span class="inzicht-is">=</span>
          <span class="inzicht-hokje smal"></span>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
