<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juf Zisa - Bundel Maker Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <aside id="dashboard" class="no-print">

        <div class="brand">
            <div class="brand-inner">
                <div class="brand-icon">💰</div>
                <div class="brand-text">
                    <h1>Geld Maker</h1>
                    <p>Juf Zisa Edition</p>
                </div>
            </div>
        </div>

        <div class="dashboard-body">

            <!-- Kaart: Type oefening -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <div class="dash-card-icon green">🎯</div>
                    <span class="dash-card-title">Type oefening</span>
                </div>
                <div class="dash-card-body">
                    <div class="tab-nav">
                        <button class="tab-btn active" onclick="switchTab('vaardigheden')">Vaardigheden</button>
                        <button class="tab-btn" onclick="switchTab('winkel')">Winkeltje</button>
                    </div>
                    <div id="tab-vaardigheden" class="tab-content active">
                        <div class="field-group">
                            <label>Oefening</label>
                            <select id="type-vaardigheden">
                                <option value="tellen">Tellen: Hoeveel ligt er?</option>
                                <option value="twee_manieren">Betaal op 2 manieren</option>
                                <option value="weinig_mogelijk">Zo weinig mogelijk eenheden</option>
                            </select>
                        </div>
                    </div>
                    <div id="tab-winkel" class="tab-content">
                        <div class="field-group">
                            <label>Winkeltype</label>
                            <select id="winkelSelect">
                                <option value="supermarkt">De Supermarkt</option>
                                <option value="bakker">De Bakker</option>
                                <option value="speelgoed">De Speelgoedwinkel</option>
                                <option value="snoepwinkel">De Snoepwinkel</option>
                                <option value="elektronica">De Elektronicawinkel</option>
                                <option value="schoolwinkel">De Schoolwinkel</option>
                                <option value="kledingwinkel">De Kledingwinkel</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>Opdracht</label>
                            <select id="type-winkel" onchange="toggleKortingOpties()">
                                <option value="winkel_totaal">1. Totaal betalen</option>
                                <option value="winkel_terug">2. Terugkrijgen</option>
                                <option value="winkel_kiezen">3. Wat kan je kopen?</option>
                                <option value="winkel_exact">4. Koop voor exact bedrag</option>
                                <option value="winkel_vergelijk">5. Goedkoper / duurder?</option>
                                <option value="winkel_korting">6. Solden: korting!</option>
                            </select>
                        </div>
                        <div class="field-group" id="korting-opties" style="display:none;">
                            <label>Type kortingsoefening</label>
                            <select id="kortingSubtype">
                                <option value="korting_nieuw">Originele prijs + % korting → nieuwe prijs berekenen</option>
                                <option value="korting_hoeveel">Originele prijs + nieuwe prijs → hoeveel korting?</option>
                                <option value="korting_origineel">Nieuwe prijs + % korting → originele prijs berekenen</option>
                            </select>
                            <label style="margin-top:8px;">% korting (vink aan welke je wil afwisselen)</label>
                            <div class="checkbox-group" id="korting-percent-keuzes">
                                <label class="checkbox-container"><input type="checkbox" class="kortingPercentCheck" value="10" checked><span>10%</span></label>
                                <label class="checkbox-container"><input type="checkbox" class="kortingPercentCheck" value="20"><span>20%</span></label>
                                <label class="checkbox-container"><input type="checkbox" class="kortingPercentCheck" value="25"><span>25%</span></label>
                                <label class="checkbox-container"><input type="checkbox" class="kortingPercentCheck" value="50"><span>50%</span></label>
                            </div>
                        </div>
                        <div class="field-group">
                            <label>Items op lijstje</label>
                            <input type="number" id="aantalItems" value="2" min="1" max="4">
                        </div>
                        <div class="checkbox-group">
                            <label class="checkbox-container">
                                <input type="checkbox" id="checkSchatten">
                                <span>Inclusief schat-vraag</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kaart: Instellingen -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <div class="dash-card-icon blue">⚙️</div>
                    <span class="dash-card-title">Instellingen</span>
                </div>
                <div class="dash-card-body">
                    <div id="instellingen-banner" class="instellingen-banner" style="display:none;">
                        ⚠️ Instellingen gewijzigd — nieuwe secties gebruiken deze waarden. Bestaande secties wijzigen niet.
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label>Max. bedrag (€)</label>
                            <input type="number" id="maxBedrag" value="20">
                        </div>
                        <div class="field-group">
                            <label>Kaders / sectie</label>
                            <input type="number" id="aantalOefeningen" value="1" min="1">
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="checkCenten">
                            <span>Gebruik centen</span>
                        </label>
                        <label class="checkbox-container">
                            <input type="checkbox" id="checkKleineCenten">
                            <span>Inclusief 1ct / 2ct</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Toevoegen-knop -->
            <button id="addSectieBtn" class="primary-btn">✚ Sectie toevoegen</button>

            <!-- Kaart: Exporteren -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <div class="dash-card-icon yellow">📤</div>
                    <span class="dash-card-title">Exporteren</span>
                </div>
                <div class="dash-card-body action-group">
                    <button onclick="window.print()" class="print-btn">🖨️ Rechtstreeks afdrukken</button>
                    <button onclick="downloadAlsPdf()" class="download-btn">📄 Downloaden als PDF</button>
                    <button onclick="location.reload()" class="clear-btn">🗑 Alles wissen</button>
                </div>
            </div>

        </div>
    </aside>

    <main id="preview">
        <div id="werkblad" class="a4-page">
            <div class="student-header">
                <div class="header-box">Naam:</div>
                <div class="header-box">Datum:</div>
            </div>
            <h1 contenteditable="true" class="werkblad-titel">REKENEN MET GELD</h1>
            <div id="secties-container"></div>
        </div>
    </main>

    <div id="pdf-loading" class="pdf-loading hidden">
    <div class="pdf-loading-box">
        <div class="pdf-loading-title">PDF wordt gemaakt...</div>
        <div class="pdf-loading-text">Even wachten, je download start zo meteen.</div>
        <div class="pdf-loading-bar">
            <div class="pdf-loading-fill"></div>
        </div>
    </div>
</div>

    <script src="pdf-engine.js"></script>
<script src="script.js"></script>

</body>
</html>
