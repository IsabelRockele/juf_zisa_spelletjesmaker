<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Ik oefen met blokkenbouwsels – generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
<style>
  :root{ --frame:#d8d8dc; --ink:#1f2937; --accent:#2563eb; --muted:#6b7280; --bg:#f6f7fb; }
  *{box-sizing:border-box}
  body{margin:0; font-family:Arial, Helvetica, sans-serif; color:var(--ink); background:var(--bg);}
  header{padding:14px 18px} h1{margin:0; font-size:22px}
  .layout{display:grid; grid-template-columns:460px 1fr; gap:16px; padding:0 18px 18px}
  .panel{background:#fff; border:1px solid var(--frame); border-radius:12px; padding:12px}
  .row{display:flex; gap:10px; align-items:end; margin-bottom:8px}
  label{font-size:13px; display:flex; flex-direction:column; gap:4px}
  input[type="number"], select{padding:7px; border:1px solid var(--frame); border-radius:8px; background:#fff}
  select.mini{padding:4px 6px; font-size:12px}
  .btn{cursor:pointer; border:0; padding:8px 10px; border-radius:8px; color:#fff; background:var(--accent)}
  .btn.muted{background:var(--muted)} .btn.danger{background:#e55353}
  .small{font-size:12px; color:#6b7280}
  .sect{border:1px dashed var(--frame); border-radius:10px; padding:10px; margin-bottom:10px}
  .sect h3{margin:0 0 8px; font-size:15px}
  .tools{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px}
  .list{display:grid; gap:8px}
  .itemRow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px; border:1px solid var(--frame); border-radius:10px; background:#fff}
  .itemRow .left{display:flex; align-items:center; gap:8px}

  /* Werkblad rechts */
  .sheetHdr{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; position:sticky; top:8px; background:#fff; z-index:1; padding-bottom:8px; border-bottom:1px solid var(--frame)}
  .naam{font-size:14px} .naam span{border-bottom:1px solid #000; padding:0 90px 2px 0}
  .title{font-weight:bold}
  .typeHdr{font-weight:bold; margin:12px 0 6px}
  .gridRow2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .gridRow3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px}
  .cardWB{border:1px solid var(--frame); border-radius:12px; padding:10px; background:#fff}

  /* kaders */
  .slotLG, .slotSM, .slotXL{
    border:1px solid var(--frame); border-radius:10px; padding:6px; background:#fff; display:flex;
    align-items:center; justify-content:center; margin-bottom:10px;
  }
  .slotLG{ width: 340px; height: 220px; }     /* standaard 3D bij verbind-opgaven */
  .slotSM{ width: 240px; height: 180px; }     /* plannen/aanzichten bij verbinden */
  .slotXL{ width: 410px; height: 300px; }     /* groot knipformaat voor 'Bouw volgens plattegrond' */
  .slotLG img, .slotSM img, .slotXL img{ max-width:100%; max-height:100%; display:block }

  /* verbindpunten – dicht bij item, veel ruimte tussen rijen */
  .slotWrap{position:relative}
  .dotTop,.dotBottom{
    position:absolute; left:50%; transform:translateX(-50%);
    width:14px; height:14px; border:1.8px solid #000; border-radius:50%; background:#fff
  }
  .dotTop{top:6px} .dotBottom{bottom:6px}
  .setGrid{display:grid; grid-template-rows:auto auto; row-gap:48px;}
  .rowItems{display:grid; grid-template-columns:repeat(3, 1fr); gap:14px}
</style>
</head>
<body>
<header><h1>Generator blokkenbouwsels</h1></header>

<div class="layout">
  <!-- LINKS -->
  <aside class="panel">
    <div class="row">
      <label>Rastergrootte
        <input id="gridSize" type="number" min="2" max="6" value="4">
      </label>
      <label>Totaal # kubussen
        <input id="totalBlocks" type="number" min="2" max="24" value="8">
      </label>
      <label>Max per rij (PDF)
        <select id="maxPerRow"><option>2</option><option selected>3</option></select>
      </label>
    </div>
    <div class="row">
      <label>Bloktype
        <select id="blockStyle">
          <option value="cube">Kubussen</option>
          <option value="linking" selected>Linking cubes</option>
        </select>
      </label>
    </div>
    <p class="small">Tip: bij *Verbind: bouwsel ↔ aanzicht* kiest u voortaan het aanzicht **per set**.</p>

    <section class="sect">
      <h3>Plattegrond invullen</h3>
      <div class="tools">
        <button class="btn" data-add="plat1">Voeg 1 toe</button>
        <button class="btn muted" data-add="plat3">Voeg 3 toe</button>
        <button class="btn danger" data-clear="plat">Wis deze sectie</button>
      </div>
      <div class="list" id="list-plat"></div>
    </section>

    <section class="sect">
      <h3>Verbind: bouwsel ↔ plattegrond</h3>
      <div class="tools">
        <button class="btn" data-add="vplat1">Voeg 1 set toe</button>
        <button class="btn muted" data-add="vplat3">Voeg 3 sets toe</button>
        <button class="btn danger" data-clear="vplat">Wis deze sectie</button>
      </div>
      <div class="list" id="list-vplat"></div>
    </section>

    <section class="sect">
      <h3>Verbind: bouwsel ↔ aanzicht</h3>
      <div class="tools">
        <button class="btn" data-add="vview1">Voeg 1 set toe</button>
        <button class="btn muted" data-add="vview3">Voeg 3 sets toe</button>
        <button class="btn danger" data-clear="vview">Wis deze sectie</button>
      </div>
      <div class="list" id="list-vview"></div>
    </section>

    <section class="sect">
      <h3>Bouw volgens plattegrond (oplossing achteraan)</h3>
      <div class="tools">
        <button class="btn" data-add="bouw1">Voeg 1 toe</button>
        <button class="btn muted" data-add="bouw3">Voeg 3 toe</button>
        <button class="btn danger" data-clear="bouw">Wis deze sectie</button>
      </div>
      <div class="list" id="list-bouw"></div>
    </section>
  </aside>

  <!-- RECHTS: werkblad -->
  <main class="panel">
    <div class="sheetHdr">
      <div>
        <span class="naam">Naam: <span>&nbsp;</span></span>
        <span class="title" style="margin-left:12px">Ik oefen met blokkenbouwsels</span>
      </div>
      <div style="display:flex; gap:8px">
        <button class="btn" id="btnPdf">Download als PDF</button>
        <button class="btn muted" id="btnReset">Alles leegmaken</button>
      </div>
    </div>
    <div id="sheetPreview"></div>
  </main>
</div>

<script>
/* ===== Helpers ===== */
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function choice(A){return A[Math.floor(Math.random()*A.length)]}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const palette=["#ff6b6b","#4dabf7","#51cf66","#ffd43b","#845ef7","#ff922b","#63e6be"];
function shade(hex,p){let r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);
  if(p<0){r*=1+p;g*=1+p;b*=1+p;}else{r+=(255-r)*p;g+=(255-g)*p;b+=(255-b)*p;}return`rgb(${r|0},${g|0},${b|0})`}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

/* ===== Model ===== */
let blockStyle='linking';
const exercises=[]; let exId=0;

/* ===== Generator ===== */
function makeHeightMap(n,total){
  const H=Array.from({length:n},()=>Array(n).fill(0));
  const sx=rnd(0,n-1), sy=rnd(0,n-1);
  H[sy][sx]=1; let placed=1; let cells=[[sx,sy]];
  function nb(x,y){const a=[]; if(x>0)a.push([x-1,y]); if(x<n-1)a.push([x+1,y]); if(y>0)a.push([x,y-1]); if(y<n-1)a.push([x,y+1]); return a;}
  const frontier=new Set(nb(sx,sy).map(([x,y])=>`${x},${y}`));
  while(placed<total){
    if(Math.random()<0.6){const pick=cells.filter(([x,y])=>H[y][x]<6); const [cx,cy]=(pick.length?choice(pick):choice(cells)); H[cy][cx]++; placed++;}
    else if(frontier.size){const p=[...frontier][Math.floor(Math.random()*frontier.size)]; frontier.delete(p);
      const [nx,ny]=p.split(',').map(Number); H[ny][nx]=1; placed++; cells.push([nx,ny]);
      for(const [ax,ay] of nb(nx,ny)) if(H[ay][ax]===0) frontier.add(`${ax},${ay}`);}
    else{const [cx,cy]=choice(cells); H[cy][cx]++; placed++;}
  }
  return H;
}
function makeViews(H){
  const n=H.length, front=Array(n).fill(0), side=Array(n).fill(0);
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){const v=H[y][x]; if(v>front[x])front[x]=v; if(v>side[y])side[y]=v;}
  return {front,side};
}

/* ‘Bouw’-variant: maak kolommen naar achter toe niet lager, zodat blokjes niet verdwijnen */
function adjustForVisibility(H){
  const n=H.length;
  for(let x=0;x<n;x++){
    let best=0;
    for(let y=0;y<n;y++){
      H[y][x]=Math.max(H[y][x], best);
      best=H[y][x];
    }
  }
  return H;
}

/* ===== Tekenen: kubussen & linking cubes ===== */
function drawCubesOblique(H, S=52){
  const n=H.length, d={x:S*0.5, y:-S*0.5};
  let maxH=0; for(const r of H) for(const v of r) if(v>maxH) maxH=v;
  const pad=8, baseX=pad, baseY=pad + maxH*S + n*Math.abs(d.y) + 8;
  const w=pad*2 + n*(S + Math.abs(d.x)), h=pad*2 + maxH*S + n*(S + Math.abs(d.y)) + 8;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h; const ctx=cv.getContext('2d'); ctx.lineWidth=1;

  function P(x,y,z){return[baseX+x*S+y*d.x, baseY+(-z*S)+y*d.y]}
  function poly(pts,fill,stroke){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}}
  function line(a,b,col="#0003",lw=0.9){ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();}
  const hAt=(x,y)=> (x<0||y<0||x>=n||y>=n)?0:H[y][x];

  for(let y=n-1;y>=0;y--){
    for(let x=0;x<n;x++){
      const h=H[y][x]; if(h<=0) continue;
      const base=choice(palette), colTop=shade(base,0.25), colFront=shade(base,-0.05), colSide=shade(base,-0.18);
      for(let k=0;k<h;k++){ const TL=P(x,y,k+1), TR=[TL[0]+S,TL[1]], BL=[TL[0],TL[1]+S], BR=[TR[0],TR[1]+S]; poly([TL,TR,BR,BL], colFront, "#0003"); }
      for(let k=1;k<h;k++){ const A=P(x,y,k), B=[A[0]+S,A[1]]; line(A,B,"#0005",0.9); }
      const TLt=P(x,y,h), TRt=[TLt[0]+S,TLt[1]], TLtd=[TLt[0]+d.x,TLt[1]+d.y], TRtd=[TRt[0]+d.x,TRt[1]+d.y]; poly([TLtd,TRtd,TRt,TLt], colTop, "#0003");
      const rightH = hAt(x+1,y);
      for(let k=rightH;k<h;k++){ const TRk=[P(x,y,k+1)[0]+S, P(x,y,k+1)[1]], BRk=[TRk[0],TRk[1]+S];
        const TRkd=[TRk[0]+d.x,TRk[1]+d.y], BRkd=[BRk[0]+d.x,BRk[1]+d.y]; poly([TRk,BRk,BRkd,TRkd], colSide, "#0002"); line(TRk,TRkd,"#0004",0.8); }
    }
  }
  return cv;
}

/* Linking cubes – 1 rond gat per vlak, bovenop een ‘stud’ */
function drawLinkingCubes(H, S=52){
  const n=H.length, d={x:S*0.5, y:-S*0.5};
  let maxH=0; for(const r of H) for(const v of r) if(v>maxH) maxH=v;
  const pad=8, baseX=pad, baseY=pad + maxH*S + n*Math.abs(d.y) + 8;
  const w=pad*2 + n*(S + Math.abs(d.x)), h=pad*2 + maxH*S + n*(S + Math.abs(d.y)) + 8;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h; const ctx=cv.getContext('2d'); ctx.lineWidth=1;

  function P(x,y,z){return[baseX+x*S+y*d.x, baseY+(-z*S)+y*d.y]}
  function poly(pts,fill,stroke){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}}
  function line(a,b,col="#0003",lw=0.9){ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();}
  const hAt=(x,y)=> (x<0||y<0||x>=n||y>=n)?0:H[y][x];

  for(let y=n-1;y>=0;y--){
    for(let x=0;x<n;x++){
      const h=H[y][x]; if(h<=0) continue;
      const base=choice(palette),
            colFront=shade(base,-0.02),
            colTop=shade(base,0.10),
            colSide=shade(base,-0.12),
            hole=shade(base,-0.45), ring=shade(base,-0.25);

      for(let k=0;k<h;k++){
        const TL=P(x,y,k+1), TR=[TL[0]+S,TL[1]], BL=[TL[0],TL[1]+S], BR=[TR[0],TR[1]+S];
        poly([TL,TR,BR,BL], colFront, "#0003");
        const cx=TL[0]+S*0.5, cy=TL[1]+S*0.5, r=S*0.18;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=hole; ctx.fill(); ctx.strokeStyle=ring; ctx.lineWidth=0.9; ctx.stroke();
      }
      for(let k=1;k<h;k++){ const A=P(x,y,k), B=[A[0]+S,A[1]]; line(A,B,"#0006",0.9); }

      const TLt=P(x,y,h), TRt=[TLt[0]+S,TLt[1]], TLtd=[TLt[0]+d.x,TLt[1]+d.y], TRtd=[TRt[0]+d.x,TRt[1]+d.y];
      poly([TLtd,TRtd,TRt,TLt], colTop, "#0003");
      const cxTop=(TLt[0]+TRt[0]+TLtd[0]+TRtd[0])/4, cyTop=(TLt[1]+TRt[1]+TLtd[1]+TRtd[1])/4;
      ctx.beginPath(); ctx.arc(cxTop, cyTop, S*0.16, 0, Math.PI*2); ctx.fillStyle=shade(base,0.15); ctx.fill();
      ctx.beginPath(); ctx.arc(cxTop, cyTop, S*0.16, 0, Math.PI*2); ctx.strokeStyle=ring; ctx.lineWidth=0.9; ctx.stroke();

      const rightH = hAt(x+1,y);
      for(let k=rightH;k<h;k++){
        const TRk=[P(x,y,k+1)[0]+S, P(x,y,k+1)[1]], BRk=[TRk[0],TRk[1]+S];
        const TRkd=[TRk[0]+d.x,TRk[1]+d.y], BRkd=[BRk[0]+d.x,BRk[1]+d.y];
        poly([TRk,BRk,BRkd,TRkd], colSide, "#0002"); line(TRk,TRkd,"#0004",0.8);
        const cx=(TRk[0]+BRk[0]+TRkd[0]+BRkd[0])/4, cy=(TRk[1]+BRk[1]+TRkd[1]+BRkd[1])/4;
        ctx.beginPath(); ctx.arc(cx, cy, S*0.18, 0, Math.PI*2); ctx.fillStyle=hole; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, S*0.18, 0, Math.PI*2); ctx.strokeStyle=ring; ctx.lineWidth=0.9; ctx.stroke();
      }
    }
  }
  return cv;
}

/* Plattegrond: onderste rij = vooraan */
function drawPlan(H, showNumbers=true){
  const n=H.length, cell=34, pad=12;
  const cv=document.createElement('canvas'); cv.width=pad*2+n*cell; cv.height=pad*2+n*cell;
  const ctx=cv.getContext('2d'); ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle="#54565a"; ctx.lineWidth=1; ctx.strokeRect(pad,pad,n*cell,n*cell);
  for(let i=1;i<n;i++){const x=pad+i*cell,y=pad+i*cell; ctx.beginPath(); ctx.moveTo(x,pad); ctx.lineTo(x,pad+n*cell); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(pad+n*cell,y); ctx.stroke();}
  if(showNumbers){
    ctx.fillStyle="#000"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font="16px Arial";
    for(let y=0;y<n;y++){
      const dispRow=(n-1)-y;
      for(let x=0;x<n;x++){
        const v=H[y][x]; if(v>0) ctx.fillText(String(v), pad+x*cell+cell/2, pad+dispRow*cell+cell/2);
      }
    }
  }
  return cv;
}
function drawElevationSquares(arr){
  const n=arr.length, cell=18, pad=10, max=Math.max(1,...arr);
  const cv=document.createElement('canvas'); cv.width=pad*2+n*cell; cv.height=pad*2+max*cell;
  const ctx=cv.getContext('2d'); ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle="#54565a"; ctx.lineWidth=1;
  for(let i=0;i<=n;i++){ const x=pad+i*cell; ctx.beginPath(); ctx.moveTo(x,pad); ctx.lineTo(x,pad+max*cell); ctx.stroke(); }
  for(let j=0;j<=max;j++){ const y=pad+j*cell; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(pad+n*cell,y); ctx.stroke(); }
  for(let i=0;i<n;i++){ const h=arr[i]; for(let k=0;k<h;k++){ const x=pad+i*cell, y=pad + (max-1-k)*cell; ctx.fillStyle="#a3d5ff"; ctx.fillRect(x+1,y+1,cell-2,cell-2); ctx.strokeStyle="#6aa9e9"; ctx.strokeRect(x+1,y+1,cell-2,cell-2); } }
  return cv;
}
function renderIso(H){ return (blockStyle==='linking') ? drawLinkingCubes(H,52) : drawCubesOblique(H,52); }

/* ===== UI ===== */
function addExercise(type, H, sect){
  if(type==='vplat' || type==='vview'){
    const setSize=3, items=[];
    const n=clamp(Number(document.getElementById('gridSize').value),2,6);
    const total=clamp(Number(document.getElementById('totalBlocks').value),2,24);
    for(let i=0;i<setSize;i++){
      const HH=makeHeightMap(n,total);
      const iso=renderIso(HH);
      const plan=drawPlan(HH,true);
      const {front,side}=makeViews(HH);
      items.push({H:HH, iso, plan, front, side, viewImg:null});
    }
    const id=`EX_${++exId}`;
    const rec={id,type,include:true,sect,set:items, viewMode:'front'};
    updateViewImages(rec);  // initialiseren
    rec.groupKey=`vview:${rec.viewMode}`;
    exercises.push(rec);
    addListRow(rec, sect);
    refreshSheet();
    return;
  }

  // 'bouw' en 'plat'
  const n=H?H.length:clamp(Number(document.getElementById('gridSize').value),2,6);
  const total=clamp(Number(document.getElementById('totalBlocks').value),2,24);
  const HH = H || makeHeightMap(n,total);
  const HH2 = (type==='bouw')? adjustForVisibility(JSON.parse(JSON.stringify(HH))) : HH;

  const iso=renderIso(HH2);
  const planFull=drawPlan(HH2,true);
  const planEmpty=drawPlan(HH2,false);

  const id=`EX_${++exId}`;
  const rec={id,type,include:true,sect,H:HH2,assets:{iso,plan:planFull,planEmpty}};
  rec.groupKey=`plain:${type}`;
  exercises.push(rec);
  addListRow(rec, sect);
  refreshSheet();
}

function addListRow(rec, sect){
  const list=document.getElementById(`list-${sect}`);
  const row=document.createElement('div'); row.className='itemRow'; row.dataset.id=rec.id;

  const left=document.createElement('div'); left.className='left';
  const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=true; cb.onchange=()=>{rec.include=cb.checked; refreshSheet();};
  left.appendChild(cb);

  const labelSpan=document.createElement('span');
  if(rec.type==='vview'){
    labelSpan.textContent='Set verbinden (aanzicht)';
    const sel=document.createElement('select'); sel.className='mini';
    sel.innerHTML='<option value="front">Vooraanzicht</option><option value="side">Zijaanzicht</option><option value="rear">Achteraanzicht</option><option value="random">Willekeurig</option>';
    sel.value=rec.viewMode;
    sel.onchange=()=>{rec.viewMode=sel.value; updateViewImages(rec); rec.groupKey=`vview:${rec.viewMode}`; refreshSheet();};
    left.appendChild(labelSpan); left.appendChild(sel);
  }else{
    const map={plat:'Oefening plattegrond', vplat:'Set verbinden (plattegrond)', bouw:'Oefening bouwen'};
    labelSpan.textContent=map[rec.type]||rec.type;
    left.appendChild(labelSpan);
  }

  const del=document.createElement('button'); del.className='btn danger'; del.textContent='Verwijder';
  del.onclick=()=>{const i=exercises.findIndex(e=>e.id===rec.id); if(i>=0) exercises.splice(i,1); row.remove(); refreshSheet();};
  row.appendChild(left); row.appendChild(del); list.appendChild(row);
}

function updateViewImages(rec){
  for(const it of rec.set){
    let arr=null;
    if(rec.viewMode==='front') arr=it.front;
    else if(rec.viewMode==='side') arr=it.side;
    else if(rec.viewMode==='rear') arr=it.front.slice().reverse();
    else { const pick=Math.random()<0.5?'front':'side'; arr=(pick==='front')?it.front:it.side; }
    it.viewImg = drawElevationSquares(arr);
  }
}

/* ===== Werkblad – render ===== */
function headerFor(type, viewMode){
  if(type==='plat') return 'Maak de plattegrond (vul het raster met het aantal blokken per vak).';
  if(type==='vplat') return 'Verbind de bouwsels (bolletje onderaan) met de juiste plattegronden (bolletje bovenaan).';
  if(type==='vview'){
    if(viewMode==='front') return 'Verbind de bouwsels (bolletje onderaan) met het juiste vooraanzicht (bolletje bovenaan).';
    if(viewMode==='side')  return 'Verbind de bouwsels (bolletje onderaan) met het juiste zijaanzicht (bolletje bovenaan).';
    if(viewMode==='rear')  return 'Verbind de bouwsels (bolletje onderaan) met het juiste achteraanzicht (bolletje bovenaan).';
    return 'Verbind de bouwsels (bolletje onderaan) met het juiste voor- of zijaanzicht (bolletje bovenaan).';
  }
  if(type==='bouw') return 'Bouw het blokkenbouwsel volgens de plattegrond. Oplossing op de achterkant.';
  return '';
}
function groupByKey(list){
  const m=new Map();
  for(const e of list){
    const key=e.groupKey||`plain:${e.type}`;
    if(!m.has(key)) m.set(key,[]);
    m.get(key).push(e);
  }
  return m;
}
function chunk(arr,size){const out=[]; for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size)); return out;}

function renderSimpleRow(slice, container){
  const row=document.createElement('div');
  const maxPerRow=Number(document.getElementById('maxPerRow').value);
  row.className=(maxPerRow===3?'gridRow3':'gridRow2');
  slice.forEach(rec=>{
    const card=document.createElement('div'); card.className='cardWB';
    if(rec.type==='bouw'){
      // alleen grote plattegrond vooraan (oplossing komt achteraan in PDF)
      const slotPlan=document.createElement('div'); slotPlan.className='slotXL';
      const imgP=new Image(); imgP.src=rec.assets.plan.toDataURL(); slotPlan.appendChild(imgP);
      card.appendChild(slotPlan);
    }else{
      const topWrap=document.createElement('div'); topWrap.className='slotWrap';
      const slot3d=document.createElement('div'); slot3d.className='slotLG';
      const img3d=new Image(); img3d.src=rec.assets.iso.toDataURL(); slot3d.appendChild(img3d); topWrap.appendChild(slot3d);
      card.appendChild(topWrap);
      const bottom=document.createElement('div'); bottom.className='slotSM';
      const img=new Image(); img.src=(rec.type==='plat')? rec.assets.planEmpty.toDataURL() : rec.assets.plan.toDataURL();
      bottom.appendChild(img); card.appendChild(bottom);
    }
    row.appendChild(card);
  });
  container.appendChild(row);
}

function refreshSheet(){
  const area=document.getElementById('sheetPreview'); area.innerHTML='';
  const maxPerRow=Number(document.getElementById('maxPerRow').value);
  const chosen=exercises.filter(e=>e.include);
  const groups=groupByKey(chosen);

  for(const [key,list] of groups){
    const [kind,extra]=key.split(':');
    let type=(kind==='plain')? list[0].type : 'vview';
    let hdr=headerFor(type,(type==='vview')? extra : null);

    const h=document.createElement('div'); h.className='typeHdr'; h.textContent=hdr; area.appendChild(h);

    if(type!=='vplat' && type!=='vview'){
      const chunks=chunk(list, maxPerRow);
      chunks.forEach(slice=>renderSimpleRow(slice, area));
      continue;
    }

    // verbind-opgaven
    for(const rec of list){
      const row=document.createElement('div'); row.className=(maxPerRow===3?'gridRow3':'gridRow2');
      const card=document.createElement('div'); card.className='cardWB';
      const grid=document.createElement('div'); grid.className='setGrid';
      const topRow=document.createElement('div'); topRow.className='rowItems';
      for(const it of rec.set){
        const wrap=document.createElement('div'); wrap.className='slotWrap';
        const slot=document.createElement('div'); slot.className='slotLG';
        const img=new Image(); img.src=it.iso.toDataURL(); slot.appendChild(img); wrap.appendChild(slot);
        const dot=document.createElement('div'); dot.className='dotBottom'; wrap.appendChild(dot);
        topRow.appendChild(wrap);
      }
      grid.appendChild(topRow);

      const bottomRow=document.createElement('div'); bottomRow.className='rowItems';
      const shuffled=shuffle(rec.set.slice());
      for(const it of shuffled){
        const wrap=document.createElement('div'); wrap.className='slotWrap';
        const slot=document.createElement('div'); slot.className='slotSM';
        const img=new Image(); img.src=(rec.type==='vplat')? it.plan.toDataURL() : it.viewImg.toDataURL();
        slot.appendChild(img); wrap.appendChild(slot);
        const dot=document.createElement('div'); dot.className='dotTop'; wrap.appendChild(dot);
        bottomRow.appendChild(wrap);
      }
      grid.appendChild(bottomRow);
      card.appendChild(grid); row.appendChild(card);
      area.appendChild(row);
    }
  }
}

/* ===== PDF ===== */
function dotDataURL(){ const c=document.createElement('canvas'); c.width=16; c.height=16; const k=c.getContext('2d');
  k.fillStyle='#fff'; k.fillRect(0,0,16,16); k.strokeStyle='#000'; k.lineWidth=2; k.beginPath(); k.arc(8,8,6,0,Math.PI*2); k.stroke(); return c.toDataURL(); }

document.getElementById('btnPdf').addEventListener('click', ()=>{
  const chosen=exercises.filter(e=>e.include);
  const groups=groupByKey(chosen);
  const dot=dotDataURL();

  const content=[
    {text:'Naam: ___________________________', margin:[0,0,0,6]},
    {text:'Ik oefen met blokkenbouwsels', style:'title', margin:[0,0,0,12]},
  ];

  for(const [key,list] of groups){
    const [kind,extra]=key.split(':');
    const type=(kind==='plain')? list[0].type : 'vview';
    const hdr=headerFor(type,(type==='vview')? extra : null);
    content.push({text:hdr, margin:[0,0,0,6]});

    if(type!=='vplat' && type!=='vview'){
      if(type==='bouw'){
        // grote plattegronden (zonder 3D) – knipformaat
        for(let i=0;i<list.length;i+=3){
          const slice=list.slice(i,i+3).map(rec=>({image: rec.assets.plan.toDataURL(), fit:[390,285]}));
          content.push({columns:slice, columnGap:12, margin:[0,0,0,12]});
        }
      }else{
        // andere simpele opgaven in rijen van 3
        for(let i=0;i<list.length;i+=3){
          const slice=list.slice(i,i+3).map(rec=>({
            stack:[
              {image: rec.assets.iso.toDataURL(), fit:[320,210]},
              {image: (rec.type==='plat'? rec.assets.planEmpty.toDataURL() : rec.assets.plan.toDataURL()), fit:[200,160], margin:[0,6,0,0]}
            ]
          }));
          content.push({columns: slice, columnGap:12, margin:[0,0,0,10]});
        }
      }
      continue;
    }

    // verbind-opgaven
    for(const rec of list){
      const topCols = rec.set.map(it => ({stack:[
        {image: it.iso.toDataURL(), fit:[320,210]},
        {image: dot, width:14, alignment:'center', margin:[0,6,0,0]}
      ]}));
      const bottomCols = shuffle(rec.set.slice()).map(it => ({stack:[
        {image: dot, width:14, alignment:'center', margin:[0,0,0,6]},
        {image: (rec.type==='vplat'? it.plan.toDataURL() : it.viewImg.toDataURL()), fit:[200,160]}
      ]}));
      content.push({columns: topCols, columnGap:18, margin:[0,0,0,14]});
      content.push({columns: bottomCols, columnGap:18, margin:[0,0,0,24]});
    }
  }

  // Oplossingen – zelfde formaat als de grote plattegronden
  const bouwOpl=chosen.filter(e=>e.type==='bouw');
  if(bouwOpl.length){
    content.push({text:'\n— Oplossingen bouwopdrachten —', style:'title', pageBreak:'before', margin:[0,0,0,10]});
    for(let i=0;i<bouwOpl.length;i+=3){
      const slice=bouwOpl.slice(i,i+3).map(rec=>({image: rec.assets.iso.toDataURL(), fit:[390,285]}));
      content.push({columns:slice, columnGap:12, margin:[0,0,0,12]});
    }
  }

  pdfMake.createPdf({
    pageSize:'A4',
    pageMargins:[36,36,36,42],
    content,
    styles:{title:{fontSize:16, bold:true}},
    defaultStyle:{fontSize:11}
  }).download('blokkenbouwsels.pdf');
});

/* ===== Events ===== */
document.getElementById('btnReset').addEventListener('click', ()=>{
  exercises.splice(0,exercises.length);
  ['list-plat','list-vplat','list-vview','list-bouw'].forEach(id=>document.getElementById(id).innerHTML='');
  refreshSheet();
});

function addMany(kind,count,sect){
  if(kind==='vplat' || kind==='vview'){
    for(let i=0;i<count;i++) addExercise(kind,null,sect);
  }else{
    for(let i=0;i<count;i++) addExercise(kind, null, sect);
  }
}
document.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>{
  const k=b.getAttribute('data-add');
  if(k==='plat1') addMany('plat',1,'plat'); if(k==='plat3') addMany('plat',3,'plat');
  if(k==='vplat1') addMany('vplat',1,'vplat'); if(k==='vplat3') addMany('vplat',3,'vplat');
  if(k==='vview1') addMany('vview',1,'vview'); if(k==='vview3') addMany('vview',3,'vview');
  if(k==='bouw1') addMany('bouw',1,'bouw'); if(k==='bouw3') addMany('bouw',3,'bouw');
}));
document.getElementById('blockStyle').addEventListener('change', (e)=>{
  blockStyle = e.target.value;
  for(const rec of exercises){
    if(rec.type==='vplat' || rec.type==='vview'){
      for(const it of rec.set){ it.iso = renderIso(it.H); }
      updateViewImages(rec);
    }else{
      rec.assets.iso = renderIso(rec.H);
    }
  }
  refreshSheet();
});

/* Init */
refreshSheet();
</script>
