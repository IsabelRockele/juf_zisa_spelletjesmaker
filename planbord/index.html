<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planbord — Juf Zisa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <h1>Planbord</h1>
      <span class="subtitle">Maak een vrolijk bord voor je klas</span>
    </div>
    <div class="topbar-right">
      <button id="btn-verwijder" class="btn">Verwijderen</button>
      <button id="btn-import" class="btn">Openen</button>
      <input type="file" id="file-import" accept="application/json" hidden />
      <button id="btn-export" class="btn">Opslaan</button>
      <button id="btn-presentatie" class="btn btn-primary">Toon op digibord</button>
    </div>
  </header>

  <main class="werkruimte">

    <aside class="zijpaneel">
      <div class="tabs">
        <button class="tab actief" data-tab="vakken">Vakken</button>
        <button class="tab" data-tab="afbeeldingen">Afbeeldingen</button>
      </div>

      <div class="tab-inhoud" id="tab-vakken">
        <p class="hint">Klik om toe te voegen aan je bord</p>
        <div class="vakken-lijst">
          <button class="vak-knop" data-vaktype="vrij">
            <div class="vak-knop-preview" style="background: #EEEDFE; border-color: #CECBF6;">
              <span style="color: #534AB7;">Aa</span>
            </div>
            <span class="vak-knop-naam">Vrij vak</span>
            <span class="vak-knop-hint">Titel + tekst + afbeeldingen</span>
          </button>

          <button class="vak-knop" data-vaktype="checklist">
            <div class="vak-knop-preview" style="background: #E1F5EE; border-color: #9FE1CB;">
              <span style="color: #0F6E56; font-size: 18px;">☑</span>
            </div>
            <span class="vak-knop-naam">Checklist</span>
            <span class="vak-knop-hint">Lijstje met afbeelding + tekst</span>
          </button>

          <button class="vak-knop" data-vaktype="timer">
            <div class="vak-knop-preview" style="background: #FAEEDA; border-color: #FAC775;">
              <span style="color: #854F0B; font-size: 18px;">⏱</span>
            </div>
            <span class="vak-knop-naam">Timer</span>
            <span class="vak-knop-hint">Aftellen met visuele stijl</span>
          </button>

          <button class="vak-knop" data-vaktype="weer">
            <div class="vak-knop-preview" style="background: #E6F1FB; border-color: #B5D4F4;">
              <span style="color: #185FA5; font-size: 18px;">⛅</span>
            </div>
            <span class="vak-knop-naam">Weer</span>
            <span class="vak-knop-hint">Actuele temperatuur en weer</span>
          </button>

          <button class="vak-knop" data-vaktype="werkstijl">
            <div class="vak-knop-preview" style="background: #FBEAF0; border-color: #F4C0D1;">
              <span style="color: #993556; font-size: 18px;">🤫</span>
            </div>
            <span class="vak-knop-naam">Werkstijl</span>
            <span class="vak-knop-hint">Stilte of fluisterstem</span>
          </button>
        </div>

        <div class="binnenkort">
          <p class="hint-titel">Binnenkort beschikbaar:</p>
          <ul class="hint-lijst">
            <li>Verjaardag</li>
            <li>Dagprogramma</li>
            <li>Mededeling</li>
          </ul>
        </div>
      </div>

      <div class="tab-inhoud verborgen" id="tab-afbeeldingen">
        <p class="hint">Klik om toe te voegen aan je bord</p>
        <div class="bib-grid" id="bib-grid"></div>
      </div>
    </aside>

    <section class="canvas-zone">
      <div id="bord">
        <header class="bord-header" id="bord-header" title="Klik om aan te passen">
          <p class="bord-datum" id="bord-datum">Woensdag 20 mei 2026</p>
          <p class="bord-welkom" id="bord-welkom"><span class="zwaaihand">👋</span> <span id="bord-welkom-tekst">Goedemorgen klas!</span></p>
        </header>

        <div class="bord-canvas" id="bord-canvas">
          <!-- Vakken worden hier via JS toegevoegd -->
        </div>
      </div>
    </section>

  </main>

  <!-- === Kleurkiezer popover === -->
  <div id="kleurkiezer" class="kleurkiezer verborgen">
    <p class="kleurkiezer-titel">Kies een kleur</p>
    <div class="kleur-grid">
      <button class="kleur-knop" data-kleur="paars" style="background: #CECBF6;" aria-label="Paars"></button>
      <button class="kleur-knop" data-kleur="roze" style="background: #F4C0D1;" aria-label="Roze"></button>
      <button class="kleur-knop" data-kleur="groen" style="background: #C0DD97;" aria-label="Groen"></button>
      <button class="kleur-knop" data-kleur="teal" style="background: #9FE1CB;" aria-label="Teal"></button>
      <button class="kleur-knop" data-kleur="blauw" style="background: #B5D4F4;" aria-label="Blauw"></button>
      <button class="kleur-knop" data-kleur="geel" style="background: #FAC775;" aria-label="Geel"></button>
      <button class="kleur-knop" data-kleur="oranje" style="background: #F5C4B3;" aria-label="Oranje"></button>
      <button class="kleur-knop" data-kleur="grijs" style="background: #D3D1C7;" aria-label="Grijs"></button>
    </div>
  </div>

  <!-- === Presentatie-modus overlay === -->
  <div id="presentatie" class="presentatie verborgen">
    <div id="presentatie-inhoud"></div>
    <button id="btn-sluit-presentatie" class="btn-sluit" aria-label="Sluit presentatie">×</button>
  </div>

  <!-- === Header bewerken modal === -->
  <div id="header-modal" class="modal-overlay verborgen">
    <div class="modal-inhoud">
      <h3>Header aanpassen</h3>
      <label>Welkomtekst
        <input type="text" id="header-tekst" placeholder="Goedemorgen klas!" />
      </label>
      <label>Achtergrondkleur
        <div class="kleur-grid" id="header-kleur-grid">
          <button class="kleur-knop" data-thema="zon" style="background: linear-gradient(90deg, #FFE4B5, #FFDAB5);" aria-label="Zon"></button>
          <button class="kleur-knop" data-thema="paars" style="background: #EEEDFE;" aria-label="Paars"></button>
          <button class="kleur-knop" data-thema="roze" style="background: #FBEAF0;" aria-label="Roze"></button>
          <button class="kleur-knop" data-thema="groen" style="background: #EAF3DE;" aria-label="Groen"></button>
          <button class="kleur-knop" data-thema="teal" style="background: #E1F5EE;" aria-label="Teal"></button>
          <button class="kleur-knop" data-thema="blauw" style="background: #E6F1FB;" aria-label="Blauw"></button>
          <button class="kleur-knop" data-thema="geel" style="background: #FAEEDA;" aria-label="Geel"></button>
          <button class="kleur-knop" data-thema="oranje" style="background: #FAECE7;" aria-label="Oranje"></button>
        </div>
      </label>
      <label>Tekstkleur
        <input type="color" id="header-tekstkleur" value="#633806" />
      </label>
      <div class="modal-knoppen">
        <button id="header-annuleer" class="btn">Annuleren</button>
        <button id="header-ok" class="btn btn-primary">Toepassen</button>
      </div>
    </div>
  </div>

  <!-- === Timer instellen modal === -->
  <div id="timer-modal" class="modal-overlay verborgen">
    <div class="modal-inhoud">
      <h3>Timer instellen</h3>
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <label style="flex:1;">Minuten
          <input type="number" id="timer-minuten" value="5" min="0" max="120" />
        </label>
        <label style="flex:1;">Seconden
          <input type="number" id="timer-seconden" value="0" min="0" max="59" />
        </label>
      </div>
      <label>Visuele stijl
        <div class="timer-stijl-grid">
          <button class="timer-stijl-knop" type="button" data-stijl="cijfers">
            <span class="stijl-icoon">🔢</span>
            <span class="stijl-naam">Cijfers</span>
          </button>
          <button class="timer-stijl-knop" type="button" data-stijl="klok">
            <span class="stijl-icoon">🕐</span>
            <span class="stijl-naam">Klok</span>
          </button>
          <button class="timer-stijl-knop" type="button" data-stijl="taart">
            <span class="stijl-icoon">🍰</span>
            <span class="stijl-naam">Taart</span>
          </button>
          <button class="timer-stijl-knop" type="button" data-stijl="zandloper">
            <span class="stijl-icoon">⏳</span>
            <span class="stijl-naam">Zandloper</span>
          </button>
          <button class="timer-stijl-knop" type="button" data-stijl="balk">
            <span class="stijl-icoon">▰▰▱</span>
            <span class="stijl-naam">Voortgangsbalk</span>
          </button>
        </div>
      </label>
      <div class="modal-knoppen">
        <button id="timer-annuleer" class="btn">Annuleren</button>
        <button id="timer-ok" class="btn btn-primary">Toepassen</button>
      </div>
    </div>
  </div>

  <script src="kleuren.js"></script>
  <script src="bibliotheek.js"></script>
  <script src="vakken.js"></script>
  <script src="timer.js"></script>
  <script src="weer.js"></script>
  <script src="werkstijl.js"></script>
  <script src="interactie.js"></script>
  <script src="header.js"></script>
  <script src="opslag.js"></script>
  <script src="app.js"></script>

</body>
</html>
